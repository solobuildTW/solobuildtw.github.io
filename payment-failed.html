<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>付款未完成 — SoloBuildTW</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: #FFF8E7; color: #333; margin: 0; padding: 40px 20px; line-height: 1.7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.wrap { max-width: 560px; background: white; border-radius: 16px; padding: 36px 32px; box-shadow: 0 8px 32px rgba(192,81,47,0.15); border-top: 6px solid #C0512F; }
h1 { color: #C0512F; margin: 0 0 12px; font-size: 26px; }
.lead { color: #666; margin-bottom: 24px; }
.status-box { background: #fff5f0; border-left: 4px solid #E89B5A; padding: 14px 18px; border-radius: 8px; margin: 20px 0; font-size: 14px; }
.code { font-family: monospace; background: #FAF4E6; padding: 2px 8px; border-radius: 4px; color: #C0512F; }
.reasons { background: #FAF4E6; padding: 16px 22px; border-radius: 8px; margin: 20px 0; }
.reasons h3 { margin: 0 0 10px; color: #2F5B4F; font-size: 16px; }
.reasons li { margin: 6px 0; }
.btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 28px; }
.btn { display: inline-block; padding: 14px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 15px; text-align: center; flex: 1; min-width: 180px; }
.btn-primary { background: #E89B5A; color: white; }
.btn-primary:hover { background: #C97A3F; }
.btn-secondary { background: #f0f0f0; color: #333; }
.btn-secondary:hover { background: #ddd; }
.contact { color: #999; font-size: 13px; text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
.emoji { font-size: 32px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
<span class="emoji">⚠️</span>
<h1>付款未完成</h1>
<p class="lead">你的訂單沒有完成付款，可能是授權失敗、取消，或網路中斷。我們<b>沒有向你收費</b>。</p>

<div class="status-box" id="status-box">
正在確認狀態...
</div>

<div class="reasons">
<h3>💡 常見原因</h3>
<ul>
<li>信用卡額度不足 / 過期 / 被銀行擋下</li>
<li>3D 驗證失敗或逾時</li>
<li>網路中斷 / 瀏覽器關閉</li>
<li>主動取消付款</li>
</ul>
</div>

<div class="btn-row">
<a href="https://solobuildtw.com/" class="btn btn-primary">↻ 重新購買</a>
<a href="https://solobuildtw.com/" class="btn btn-secondary">回首頁</a>
</div>

<p class="contact">
有問題請來信 harvey3630@gmail.com<br>
若你的銀行已扣款，請保留訂單編號告知我們，會立即退款。
</p>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const status = params.get('status') || '';
  const orderNo = params.get('orderNo') || '';
  const box = document.getElementById('status-box');
  if (status) {
    box.innerHTML = '<b>付款狀態</b>：<span class="code">' + status + '</span>' +
      (orderNo ? '<br><b>訂單編號</b>：<span class="code">' + orderNo + '</span>' : '');
  } else {
    box.innerHTML = '無狀態回傳。請確認你的訂單狀態，或聯絡客服。';
  }
})();
</script>
</body>
</html>
